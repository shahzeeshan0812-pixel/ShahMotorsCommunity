<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Shah Motors Community</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>User Profile</h1>
    </header>
    <main>
        <div class="profile-container">
            <h2>Welcome, Username!</h2>
            <div class="profile-details">
                <h3>Personal Information</h3>
                <p><strong>Name:</strong> User Name</p>
                <p><strong>Email:</strong> user@example.com</p>
                <p><strong>Contact:</strong> +1234567890</p>
            </div>
            <div class="profile-interests">
                <h3>Interests</h3>
                <p>Luxury Cars, Motorsports, Community Events, New Releases.</p>
            </div>
            <button onclick="alert('Edit Profile clicked!')">Edit Profile</button>
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Shah Motors Community</p>
    </footer>
</body>
</html>
